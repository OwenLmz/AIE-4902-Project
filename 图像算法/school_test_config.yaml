paths:
  model: models/yolov8n.pt
  images_dir: images/school_test
  outputs_dir: outputs/school_test

runtime:
  device: cpu
  image_size: 640
  confidence: 0.20
  sample_interval_min: 30
  suspect_threshold_min: 20
  redis_ttl_sec: 120

model:
  auto_download: true
  person_classes:
    - person
  object_classes:
    - backpack
    - handbag
    - suitcase
    - book
    - laptop
    - cell phone
    - bottle
    - cup
    - umbrella

roi:
  overlap_threshold: 0.30

mysql:
  host: "${MYSQL_HOST:localhost}"
  port: "${MYSQL_PORT:3306}"
  user: "${MYSQL_USER:root}"
  password: "${MYSQL_PASSWORD:}"
  database: "${MYSQL_DATABASE:smart_campus}"
  charset: utf8mb4

redis:
  host: "${REDIS_HOST:localhost}"
  port: "${REDIS_PORT:6379}"
  db: "${REDIS_DB:0}"
  decode_responses: true

fallback_seats:
  - seat_id: SCHOOL-SUSPECT-01
    floor: 3
    zone: SCHOOL
    camera_id: SCHOOL-01
    roi_x1: 900
    roi_y1: 1600
    roi_x2: 1450
    roi_y2: 2300
    is_active: 1

